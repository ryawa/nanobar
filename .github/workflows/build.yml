name: Build macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project nanobar.xcodeproj \
            -scheme nanobar \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign
        run: |
          codesign --deep --force --sign - \
          --identifier com.ryawa.nanobar \
          build/Build/Products/Release/nanobar.app

      - name: Zip app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent nanobar.app nanobar.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/nanobar.zip
          generate_release_notes: true
